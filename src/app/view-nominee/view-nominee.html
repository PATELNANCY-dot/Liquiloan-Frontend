<div class="page-container">


    <!-- Heading -->
    <div class="page-header text-center">
      <h1>
        <span class="orange">Change</span>
        <span class="navy">Nominee</span>
      </h1>
      <p class="subtitle">Manage and update nominee details</p>
    </div>

    <!-- Nominee Card -->
    <div class="nominee-card">

      <!-- Header -->
      <div class="row nominee-header">
        <div class="col-md-8">
          Nominee  Name
        </div>

        <div class="col-md-4 text-end">
          Action
        </div>
      </div>

      <div class="divider"></div>

      <div *ngIf="nominees.length === 0" class="text-center empty-msg">
        No nominees found
      </div>

      <div *ngFor="let nominee of nominees" class="row nominee-row align-items-center">

        <div class="col-md-8 nominee-name">
          {{ nominee.nomineeName }}
        </div>
      </div>

      <div class="form-actions">
        <button class="change-btn" type="button" (click)="changeNominee()">Change</button>
      </div>

    </div>

    <!-- Back button -->
    <div class="form-actions">
      <button class="back-btn" type="button" (click)="back()">← Back</button>
    </div>



  <div class="classdiv text-left ">
    <div class="footer-bar">

      <!-- LEFT: SOCIAL ICONS -->
      <div class="social-icons">
        <a href="https://www.facebook.com" target="_blank">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.twitter.com" target="_blank">
          <i class="bi bi-twitter"></i>
        </a>
        <a href="https://www.linkedin.com" target="_blank">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://www.youtube.com" target="_blank">
          <i class="bi bi-youtube"></i>
        </a>
        <a href="https://www.instagram.com" target="_blank">
          <i class="bi bi-instagram"></i>
        </a>
      </div>

      <!-- RIGHT -->
      <div class="footer-right">
        <span class="divider">|</span>

        <span class="toll">
          <i class="bi bi-telephone"></i>
          1800-123-456
        </span>

        <span class="divider">|</span>

        <a routerLink="/faq" class="help-link">
          <i class="bi bi-question-circle"></i>
          Help
        </a>
      </div>

    </div>
  </div>

</div>
