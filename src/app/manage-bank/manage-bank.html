
<div class="page-container">

  <div>

    <!-- Heading -->
    <div class="page-header text-center">
      <h1>
        <span class="orange">Bank</span>
        <span class="navy">Accounts</span>
      </h1>
      <p class="subtitle">View your account holder and bank details</p>
    </div>

    <!-- Bank Card -->
    <div class="bank-card text-left">

      <!-- Header -->
      <div class="row bank-header">
        <div class="col-md-4">
          Bank Name
        </div>

        <div class="col-md-4">
          Account Number
        </div>

      </div>

      <div class="dividertop"></div>

      <div *ngIf="banks.length === 0" class="text-center empty-msg">
        No bank details found
      </div>

      <div *ngFor="let bank of banks" class="row bank-row align-items-center">

        <div class="col-md-4">
          {{ bank.bankName }}
        </div>

        <div class="col-md-4">
          {{ bank.accountNumber }}
        </div>

      </div>
      <div class="form-actions mt-3">
        <button class="add-btn" (click)="addBank()">Add Bank</button>
      </div>
    </div>

    <!-- Back button -->
    <div class="form-actions">
      <button class="back-btn" type="button" routerLink="/manage-account">← Back</button>
    </div>


  </div>



  <div class="classdiv text-left ">
    <div class="footer-bar">

      <!-- LEFT: SOCIAL ICONS -->
      <div class="social-icons">
        <a href="https://www.facebook.com" target="_blank">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.twitter.com" target="_blank">
          <i class="bi bi-twitter"></i>
        </a>
        <a href="https://www.linkedin.com" target="_blank">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://www.youtube.com" target="_blank">
          <i class="bi bi-youtube"></i>
        </a>
        <a href="https://www.instagram.com" target="_blank">
          <i class="bi bi-instagram"></i>
        </a>
      </div>

      <!-- RIGHT -->
      <div class="footer-right">
        <span class="divider">|</span>

        <span class="toll">
          <i class="bi bi-telephone"></i>
          1800-123-456
        </span>

        <span class="divider">|</span>

        <a routerLink="/faq" class="help-link">
          <i class="bi bi-question-circle"></i>
          Help
        </a>
      </div>

    </div>
  </div>


</div>
