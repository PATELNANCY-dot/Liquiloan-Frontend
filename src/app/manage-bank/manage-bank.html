
<div>

  <div>

    <!-- Heading -->
    <div class="page-header text-center">
      <h1>
        <span class="orange">Bank</span>
        <span class="navy">Accounts</span>
      </h1>
      <p class="subtitle">View your account holder and bank details</p>
    </div>

    <!-- Bank Card -->
    <div class="bank-card text-left">

      <!-- Header -->
      <div class="row bank-header">
        <div class="col-md-4">
          Bank Name
        </div>

        <div class="col-md-4">
          Account Number
        </div>

      </div>

      <div class="dividertop"></div>

      <div *ngIf="banks.length === 0" class="text-center empty-msg">
        No bank details found
      </div>

      <div *ngFor="let bank of banks" class="row bank-row align-items-center">

        <div class="col-md-4">
          {{ bank.bankName }}
        </div>

        <div class="col-md-4">
          {{ bank.accountNumber }}
        </div>

      </div>
      <div class="form-actions mt-3">
        <button class="add-btn" (click)="addBank()">Add Bank</button>
      </div>
    </div>

    <!-- Back button -->
    <div class="form-actions">
      <button class="back-btn" type="button" (click)="BACK()">← Back</button>
    </div>


  </div>






</div>
