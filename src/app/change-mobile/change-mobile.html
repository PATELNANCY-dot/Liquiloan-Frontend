

<div class="page-container">
  <!-- Header -->
  <div class="page-header">
    <h2>Change Mobile</h2>
  </div>
  <div id="recaptcha"></div>
  <!-- Card -->
  <div class="nominee-card">

    <div class="form-grid">

      <!-- Client Name -->
      <div class="field">
        <label>Client Name</label>
        <input type="text" [value]="account?.name" readonly>
      </div>

      <!-- PAN -->
      <div class="field">
        <label>PAN Number</label>
        <input type="text" [value]="account?.pan" readonly>
      </div>

      <!-- Existing Mobile -->
      <div class="field">
        <label>Mobile Number</label>
        <input type="text" [value]="account?.mobile" readonly>
      </div>

      <!-- Existing Email -->
      <div class="field">
        <label>Existing Email</label>
        <input type="text" [value]="account?.email" readonly>
      </div>


      <!-- New Mobile -->
      <div class="field">
        <label>New Mobile</label>
        <input type="text" [(ngModel)]="newMobile" placeholder="Enter new mobile">
      </div>
      <!-- OTP box -->
      <div class="otp-clean mt-2">
        <input type="text"
               placeholder="Enter Mobile OTP"
               [(ngModel)]="mobileOtp">
        <span class="otp-link" (click)="sendMobileOtp()">Send OTP</span>
        <span class="otp-link" (click)="verifyMobileOtp()">Verify</span>
        <span *ngIf="mobileOtpVerified" class="text-success ms-2">✔ Verified</span>
      </div>

    </div>
    <div class="form-actions">
      <button class="back-btn" (click)="BACK()">← Back</button>
      <button class="submit-btn mt-2" (click)="updateMobile()">Update Mobile</button>
    </div>

  </div>


  <div class="classdiv text-left ">
    <div class="footer-bar">

      <!-- LEFT: SOCIAL ICONS -->
      <div class="social-icons">
        <a href="https://www.facebook.com" target="_blank">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.twitter.com" target="_blank">
          <i class="bi bi-twitter"></i>
        </a>
        <a href="https://www.linkedin.com" target="_blank">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://www.youtube.com" target="_blank">
          <i class="bi bi-youtube"></i>
        </a>
        <a href="https://www.instagram.com" target="_blank">
          <i class="bi bi-instagram"></i>
        </a>
      </div>

      <!-- RIGHT -->
      <div class="footer-right">
        <span class="divider">|</span>

        <span class="toll">
          <i class="bi bi-telephone"></i>
          1800-123-456
        </span>

        <span class="divider">|</span>

        <a routerLink="/faq" class="help-link">
          <i class="bi bi-question-circle"></i>
          Help
        </a>
      </div>

    </div>
  </div>

</div>
