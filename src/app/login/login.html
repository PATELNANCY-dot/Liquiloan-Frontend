<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!-- Custom Alert -->

<div class="page">

  <div class="container">
   
    <!-- LEFT SIDE -->
    <div class="box left">
      <div class="arrow-top-left">
        <i class="bi bi-arrow-left-short" routerLink="/home"></i>
      </div>
      <h2>New Here?</h2>
      <p>Create your account and start investing with Liquiloans!</p>
      <button routerLink="/registration1">Join Now</button>
    </div>



    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2>Sign In</h2>

        <!-- Inputs -->
        <input class="textf"
               type="email"
               placeholder="Email"
               [(ngModel)]="email"
               name="email" />
        <div class="password-box">
          <input class="textf"
                 [type]="showPassword ? 'text' : 'password'"
                 placeholder="Password"
                 [(ngModel)]="password"
                 name="password" />

          <i class="bi"
             [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
             (click)="togglePassword()"></i>
        </div>



        <!-- Links -->
        <div class="links">
          <a routerLink="/forgot-password">Forgot password?</a>
          <a (click)="sendOtp($event)">Login with OTP</a>
        </div>
        <!-- Login button -->
        <div style="text-align:center; margin-bottom:15px;">
          <button type="button" (click)="login()" class="login-btn">
            Login
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
