
<div class="page-container">


  <div class="page-header">
    <h2>Change Email</h2>
  </div>

  <div class="nominee-card">

    <!-- Bind the form group here -->
    <form [formGroup]="changeEmailForm" class="form-grid" (ngSubmit)="updateEmail()">

      <div class="field">
        <label>Client Name</label>
        <input type="text" [value]="account?.name" readonly>
      </div>

      <div class="field">
        <label>PAN Number</label>
        <input type="text" [value]="account?.pan" readonly>
      </div>

      <div class="field">
        <label>Mobile Number</label>
        <input type="text" [value]="account?.mobile" readonly>
      </div>

      <div class="field">
        <label>Existing Email</label>
        <input type="text" [value]="account?.email" readonly>
      </div>

      <div class="field">
        <label>New Email</label>
        <input type="email"
               formControlName="newEmail"
               placeholder="Enter new email"
               (blur)="onEmailBlur()">
      </div>

      <div class="field">
        <label>Enter OTP</label>
        <div class="otp-clean">
          <input type="text"
                 formControlName="emailOtp"
                 maxlength="6"
                 placeholder="Enter 6-digit OTP">

          <span class="otp-link" (click)="verifyEmailOtp()">Verify</span>

          <span *ngIf="otpVerified" class="text-success ms-2">
            ✔ Verified
          </span>
        </div>
      </div>
    </form>

    <div class="form-actions">
      <button type="button" class="back-btn" (click)="BACK()">← Back</button>
      <button type="submit" class="submit-btn" [disabled]="!otpVerified">Update Email</button>
    </div>
  </div>

  <div class="classdiv text-left">
    <!-- Social Icons -->
    <div class="social-icons d-flex gap-3">
      <a href="https://www.facebook.com" target="_blank" class="facebook">
        <i class="bi bi-facebook"></i>
      </a>
      <a href="https://www.twitter.com" target="_blank" class="twitter">
        <i class="bi bi-twitter"></i>
      </a>
      <a href="https://www.linkedin.com" target="_blank" class="linkedin">
        <i class="bi bi-linkedin"></i>
      </a>
      <a href="https://www.youtube.com" target="_blank" class="youtube">
        <i class="bi bi-youtube"></i>
      </a>
      <a href="https://www.instagram.com" target="_blank" class="instagram">
        <i class="bi bi-instagram"></i>
      </a>
      <a>
        |
      </a>

    </div>
  </div>
</div>
