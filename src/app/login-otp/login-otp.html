<div class="page">
  <div class="container">


    <!-- LEFT SIDE -->
    <div class="box left">
      <div class="arrow-top-left">
        <i class="bi bi-arrow-left-short" routerLink="/home"></i>
      </div>
      <h2>New Here?</h2>
      <p>Create your account and start investing with Liquiloans!</p>
      <button routerLink="/registration1">Join Now</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2 style="text-align:center;scroll-margin-top:20px">Sign In</h2>
        <h6>Enter the 6-digit OTP sent to your email</h6>
        <!-- OTP BOXES -->
        <div class="otp-container">
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
        </div>

        <!-- RESEND -->
        <div style="text-align:center;">
          <button type="button" id="bt1" (click)="sendOtp()">Resend</button>
        </div>

        <div class="links">
          <a routerLink="/forgot-password">Forgot password?</a>
          <a routerLink="/login" class="otp-link">Login with password</a>
        </div>
        <br /><br />

        <!-- Submit OTP -->
        <div style="text-align:center">
          <button type="button" (click)="verifyOtp()">Login</button>
        </div>

      </form>
    </div>

  </div>
</div>
