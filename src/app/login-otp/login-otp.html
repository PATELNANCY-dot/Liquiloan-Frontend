<div class="page">
  <div class="container">

    <!-- LEFT SIDE -->
    <div class="box left">
      <h2 style="text-align:center">Sign Up</h2>
      <button routerLink="/registration1">Join Now</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2 style="text-align:center">Sign In</h2>

        <!-- Email -->
        <input class="textf"
               type="email"
               name="email"
               placeholder="Email"
               [(ngModel)]="email">

        <!-- OTP BOXES -->
        <div class="otp-container">
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input" (input)="moveNext($event); collectOtp()" (keydown.backspace)="moveBack($event)" />
        </div>

        <!-- RESEND -->
        <div style="text-align:center; margin-bottom:15px;">
          <button type="button" id="bt1" (click)="sendOtp()">Send</button>
        </div>

        <div class="links">
          <a routerLink="/forgot-password">Forgot password?</a>
          <a routerLink="/login" class="otp-link">Login with password</a>
        </div>
        <br /><br />

        <!-- Submit OTP -->
        <div style="text-align:center; margin-bottom:15px;">
          <button type="button" (click)="verifyOtp()">Submit</button>
        </div>

      </form>
    </div>

  </div>
</div>
