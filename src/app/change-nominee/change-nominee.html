<div class="main-wrapper">
  <h5 class="page-title">Nominee Information</h5>
  <div class="content-wrapper">
    <div class="form-box" #nomineeContainer>
      <form [formGroup]="nomineeForm" (ngSubmit)="updateNominee()">

        <div formArrayName="nominees">
          <div class="nominee-block" *ngFor="let nominee of nominees.controls; let i = index" [formGroupName]="i">

            <!-- Delete button at top right -->
            <div class="delete-btn-wrapper" style="text-align: right;">
              <button type="button" class="btn btn-sm btn-danger" (click)="removeNominee(i)">
                <i class="bi bi-trash"></i>
              </button>
            </div>

            <div class="form-row">
              <div class="form-col">
                <label>Nominee Name</label>
                <input formControlName="nomineeName">
              </div>

              <div class="form-col">
                <label>DOB</label>
                <div class="date-wrapper">
                  <input type="date" formControlName="nomineeDob" class="form-control" (change)="onDobChange(i)">
                  <span class="calendar-icon"><i class="bi bi-calendar3"></i></span>
                </div>
              </div>

              <div class="form-col">
                <label>Relation</label>
                <input formControlName="nomineeRelation">
              </div>

              <div class="form-col">
                <label>Nominee PAN</label>
                <input formControlName="nomineePan" [disabled]="disablePan(nominee.value)">
              </div>
            </div>

            <br>

            <!-- Guardian fields - show only if nominee is minor -->
            <div *ngIf="isMinor(nominee.value.nomineeDob)">
              <div class="form-row">
                <div class="form-col">
                  <label>Guardian Name</label>
                  <input formControlName="guardianName">
                </div>

                <div class="form-col">
                  <label>Guardian PAN</label>
                  <input formControlName="guardianPan">
                </div>
              </div>

              <div class="form-row">
                <div class="form-col">
                  <label>Guardian DOB</label>
                  <div class="date-wrapper">
                    <input type="date" formControlName="guardianDob" class="form-control">
                    <span class="calendar-icon"><i class="bi bi-calendar3"></i></span>
                  </div>
                </div>

                <div class="form-col">
                  <label>Guardian Relation</label>
                  <input formControlName="guardianRelation">
                </div>
              </div>
            </div>

            <hr>
          </div>
        </div>
      </form>
    </div>

    <br />
    <button type="button" class="next-btn" (click)="addNominee()">
      <i class="bi bi-plus-circle"></i> ADD NOMINEE
    </button>
  </div>

  <br />
  <div class="form-actions mt-3">
    <button type="button" (click)="updateNominee()">Save Nominees</button>
  </div>
</div>
