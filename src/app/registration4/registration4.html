
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <div class="container">
    <div class="progress-container">

      <div class="step" [class.active]="step >= 1">
        <div class="circle">1</div>
        <p>Registration</p>
      </div>

      <div class="step" [class.active]="step >= 2">
        <div class="circle">2</div>
        <p>Personal</p>
      </div>

      <div class="step" [class.active]="step >= 3">
        <div class="circle">3</div>
        <p>Bank</p>
      </div>

      <div class="step" [class.active]="step >= 4">
        <div class="circle">4</div>
        <p>Nominee</p>
      </div>

    </div>
    <form [formGroup]="registrationForm">

      <h1>
        <span style="color:orangered">Individual-</span>
        <span style="color:navy">Nominee Details</span>
      </h1>
      <br />


      <!--Nominee line1-->
      <div class="form-row">

        <div class="form-col">
          <label>Nominee Name:</label>
          <input type="text" formControlName="nomineeName">
          <small class="text-danger"
                 *ngIf="registrationForm.get('nomineeName')?.touched &&
             registrationForm.get('nomineeName')?.errors?.['required']">
            Nominee Name is required
          </small>
        </div>

        <div class="form-col">
          <label> Date Of Birth:</label>
          <div class="date-wrapper">
            <input type="text"
                   formControlName="nomineeDob"
                   #dobInput
                   class="custom-date"
                   placeholder="Select Date"
                   (click)="toggleCalendar()" />

            <span class="calendar-icon" (click)="toggleCalendar()">
              <i class="bi bi-calendar3"></i>
            </span>
          </div>
          <small class="text-danger"
                 *ngIf="registrationForm.get('nomineeDob')?.touched &&
                  registrationForm.get('nomineeDob')?.errors?.['required']">
            Nominee  Date Of Birth is required
          </small>
        </div>

        <div class="form-col">
          <label>Nominee Relation:</label>
          <input type="text" formControlName="nomineeRelation">
          <small class="text-danger"
                 *ngIf="registrationForm.get('nomineeRelation')?.touched &&
                    registrationForm.get('nomineeRelation')?.errors?.['required']">
            Nominee Relation is required
          </small>
        </div>

        <div class="form-col">
          <label>Percentage:</label>
          <input type="text" inputmode="numeric" formControlName="nomineePercentage" />
        </div>

       

      </div>


      <!--Nominee line 2-->
      <div class="form-row">


        <div class="form-col">
          <label>Address:</label>
          <input type="text" formControlName="nomineeAddress" />
        </div>

        <div class="form-col">
          <label>Pan Number:</label>
          <input type="text" inputmode="numeric" formControlName="nomineePan" />
        </div>


        <div class="form-col">
          <label>Gender:</label>
          <input type="text" formControlName="nomineeGender" />
        </div>


      </div>



      <!--Nominee Date Of Birth-->
      <div class="form-row">
        <div class="form-col">
          <label>Country:</label>
          <input type="text" formControlName="nomineeCountry" />
        </div>


        <div class="form-col">
          <label>State:</label>
          <input type="text" formControlName="nomineeState" />
        </div>

        <div class="form-col">
          <label>City:</label>
          <input type="text" formControlName="nomineeCity" />
        </div>

        <div class="form-col">
          <label>Pincode:</label>
          <input type="text" formControlName="nomineePincode" />
        </div>


      </div>



      <!--nominee line 3-->
      <div class="form-row">

        <div class="form-col">
          <label>EmailId:</label>
          <input type="text" formControlName="nomineeEmailId" />
        </div>

        <div class="form-col">
          <label>Mobile No:</label>
          <input type="text" inputmode="numeric" formControlName="nomineeMobileNo" />
        </div>

      </div>




      <!--if moner codeeeeeee-->
      <div *ngIf="isMinor">
        <br />
        <div class="guardian-title">
          <span>IF NOMINEE IS MINOR</span>
        </div>
        <br />

        <!--gurdian line1-->
        <div class="form-row">

          <div class="form-col">
            <label>Guardian Name</label>
            <input type="text" formControlName="guardianName">
          </div>

          <div class="form-col">
            <label>Guardian Dob</label>
            <div class="date-wrapper">
              <input type="text"
                     formControlName="guardianDob"
                     (click)="toggleGuardianCalendar()"
                     #guardianDobInput
                     class="custom-date"
                     placeholder="Select Date" />

              <span class="calendar-icon" (click)="toggleGuardianCalendar()">
                <i class="bi bi-calendar3"></i>
              </span>
            </div>
          </div>

          <div class="form-col">
            <label>Relationship of Guardian</label>
            <input type="text"  formControlName="guardianRelation">
          </div>

          <div class="form-col">
            <label>Guardian Pan(Optional)</label>
            <input type="text"  formControlName="guardianPan">
          </div>

        </div>  

        <!--gurdian line 2-->
        <div class="form-row">
          <div class="form-col">
            <label>Address:</label>
            <input type="text" formControlName="guardianAddress" />
          </div>
        </div>

        <!--gurdian line 3-->
        <div class="form-row">

          <div class="form-col">
            <label>Country:</label>
            <input type="text" formControlName="guardianCountry" />
          </div>

          <div class="form-col">
            <label>State:</label>
            <input type="text" formControlName="guardianState" />
          </div>

          <div class="form-col">
            <label>City:</label>
            <input type="text" formControlName="guardianCity" />
          </div>

          <div class="form-col">
            <label>Pincode:</label>
            <input type="text" formControlName="guardianPincode" />
          </div>

        </div>

        <!--nominee line 4-->
        <div class="form-row">

          <div class="form-col">
            <label>EmailId:</label>
            <input type="text" formControlName="guardianEmailId" />
          </div>

          <div class="form-col">
            <label>Mobile No:</label>
            <input type="text" inputmode="numeric" formControlName="guardianMobileNo" />
          </div>

        </div>

      </div>
        <!--next button-->
        <div class="form-actions">
          <button type="button" (click)="goBack()" class="next-btn"><span><i class="bi bi-arrow-left"></i></span>Back</button>

          <button type="button" (click)="submit()" class="back-btn">Submit</button>
        </div>

</form>
  </div>
