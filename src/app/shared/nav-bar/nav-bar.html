<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" routerLink="/dashboard">
      <i class="bi bi-lightning-charge-fill fs-3 me-2"></i> Liquiloans
    </a>

    <div class="collapse navbar-collapse"
         [ngClass]="{'show': !isNavCollapsed}">
      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" (click)="accountDropdownOpen = false">
            <i class="bi bi-columns-gap"></i>  Dashboard
          </a>
        </li>

        <!-- My Account -->
        <li class="nav-item dropdown" [ngClass]="{'show': accountDropdownOpen}">
          <a class="nav-link dropdown-toggle"
             href="javascript:void(0)"
             (click)="accountDropdownOpen = !accountDropdownOpen">
            <i class="bi bi-person-circle"></i> Account
          </a>

          <ul class="dropdown-menu" [ngClass]="{'show': accountDropdownOpen}">
            <li>
              <a class="dropdown-item" routerLink="/changepassword"
                 (click)="accountDropdownOpen = false">
                <i class="bi bi-chevron-right me-2"></i> Change Password
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/manage-account"
                 (click)="accountDropdownOpen = false">
                <i class="bi bi-chevron-right me-2"></i> Manage Account
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/view-nominee"
                 (click)="accountDropdownOpen = false">
                <i class="bi bi-chevron-right me-2"></i> Manage Nominee
              </a>
            </li>
          </ul>
        </li>

        <!-- Investments -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/investor-page" (click)="accountDropdownOpen = false">
            <i class="bi bi-compass"></i>   Investments
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/login">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>
