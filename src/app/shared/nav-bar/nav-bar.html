<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand logo-modern d-flex align-items-center" routerLink="/dashboard">
      <i class="bi bi-lightning-charge-fill logo-icon"></i>
      <span class="logo-text">Liquiloans</span>
    </a>

    <div class="collapse navbar-collapse" [ngClass]="{'show': !isNavCollapsed}">
      <ul class="navbar-nav ms-auto align-items-lg-center">



        <!-- Investments -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/investor-page">
            <span class="icon-circle">
              <i class="bi bi-compass"></i>
            </span>
          </a>
        </li>

        <!-- Menu -->
        <li class="nav-item dropdown" [ngClass]="{'show': accountDropdownOpen}">
          <a class="nav-link"
             href="javascript:void(0)"
             (click)="toggleAccountDropdown()">

            <span class="icon-circle">
              <i class="bi bi-list "></i>
            </span>
          </a>

          <ul class="dropdown-menu dropdown-menu-end"
              [ngClass]="{'show': accountDropdownOpen}">

            <li>
              <a class="dropdown-item"
                 routerLink="/manage-account"
                 (click)="accountDropdownOpen = false">
                <i class="bi bi-person-circle me-2"></i> Account Details
              </a>
            </li>
           
            <li>
              <a class="dropdown-item"
                 routerLink="/view-nominee"
                 (click)="accountDropdownOpen = false">
                <i class="bi bi-people-fill me-2"></i> Manage Nominee
              </a>
            </li>

            <li>
              <a class="dropdown-item"
                 routerLink="/manage-bank"
                 (click)="accountDropdownOpen = false">
                <i class="bi bi-bank2 me-2"></i> Manage Bank
              </a>
            </li>


          </ul>
        </li>


        <li class="nav-item dropdown profile-menu"
            [ngClass]="{'show': profileOpen}">

          <a class="nav-link"
             href="javascript:void(0)"
             (click)="toggleProfileDropdown()">

            <span class="icon-circle">
              <i class="bi bi-person-fill"></i> 
            </span>

          </a>

          <div class="profile-dropdown" *ngIf="profileOpen">

            <!-- NAME + EMAIL -->
            <div class="profile-section">
              <div class="profile-name">{{ account?.name }}</div>
              <div class="profile-email">{{ account?.email }}</div>
            </div>

            <hr>

            <!-- MOBILE + CHANGE PASSWORD -->
            <div class="profile-section">
              <div class="profile-mobile">
                <span class="icon-box">
                  <i class="bi bi-telephone-fill"></i>
                </span>
                {{ account?.mobile }}
              </div>

              <a class="profile-link" routerLink="/changepassword"
                 (click)="profileOpen=false">
                Change Password
              </a>
            </div>

            <hr>

            <!-- LOGOUT -->
            <div class="profile-section">
              <button class="logout-btn"
                      (click)="logout(); profileOpen=false">
                Logout
              </button>
            </div>

          </div>

        </li>

      </ul>
    </div>
  </div>
</nav>
