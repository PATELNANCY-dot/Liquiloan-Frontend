<div class="page-container">


  <div class="page-header">
    <h2>Bank Details</h2>
  </div>

  <div class="bank-card">

    <div class="form-grid">

      <div class="field">
        <label>Bank Name</label>
        <input type="text" [(ngModel)]="bank.bankName" name="bankName">
      </div>

      <div class="field">
        <label>Account Number</label>
        <input type="text" [(ngModel)]="bank.accountNumber" name="accountNumber">
      </div>

      <div class="field">
        <label>Branch Name</label>
        <input type="text" [(ngModel)]="bank.branchName" name="branchName">
      </div>

      <div class="field">
        <label>IFSC Code</label>
        <input type="text" [(ngModel)]="bank.ifscCode" name="ifscCode">
      </div>

      <div class="field">
        <label>MICR Code</label>
        <input type="text" [(ngModel)]="bank.micrCode" name="micrCode">
      </div>

      <div class="field full">
        <label>Branch Address</label>
        <input type="text" [(ngModel)]="bank.branchAddress" name="branchAddress">
      </div>

    </div>

    <div class="form-actions">
      <button class="back-btn" (click)="back()">← Back</button>
      <button class="submit-btn" (click)="saveBank()">Add</button>
    </div>

  </div>

  <div class="classdiv text-left ">
    <div class="footer-bar">

      <!-- LEFT: SOCIAL ICONS -->
      <div class="social-icons">
        <a href="https://www.facebook.com" target="_blank">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.twitter.com" target="_blank">
          <i class="bi bi-twitter"></i>
        </a>
        <a href="https://www.linkedin.com" target="_blank">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://www.youtube.com" target="_blank">
          <i class="bi bi-youtube"></i>
        </a>
        <a href="https://www.instagram.com" target="_blank">
          <i class="bi bi-instagram"></i>
        </a>
      </div>

      <!-- RIGHT -->
      <div class="footer-right">
        <span class="divider">|</span>

        <span class="toll">
          <i class="bi bi-telephone"></i>
          1800-123-456
        </span>

        <span class="divider">|</span>

        <a routerLink="/faq" class="help-link">
          <i class="bi bi-question-circle"></i>
          Help
        </a>
      </div>

    </div>
  </div>

</div>
